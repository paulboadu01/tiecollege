<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tie College</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--gold:#b8973a;--gold-light:#d4af50;--gold-dark:#8a6e24;
  --gold-bg:#1a1508;--surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --text:#f0e8d0;--text2:#c4b48a;--text3:#8a7a5a;--border:#2a2418;
  --border-gold:rgba(184,151,58,0.3);--radius:8px;--radius-lg:12px
}
body{background:var(--black);color:var(--text);font-family:'Merriweather',Georgia,'Times New Roman',serif;font-size:15px;line-height:1.6;min-height:100vh}
h1,h2,h3{font-weight:500;color:var(--gold)}
input,select,textarea{background:var(--surface2);border:0.5px solid var(--border-gold);color:var(--text);padding:9px 12px;border-radius:var(--radius);font-size:14px;width:100%;outline:none;font-family:inherit}
input:focus,select:focus{border-color:var(--gold)}
button{cursor:pointer;font-family:inherit;font-size:14px;border-radius:var(--radius);border:none;padding:10px 20px;transition:all .2s}
.btn-gold{background:var(--gold);color:var(--black);font-weight:500}
.btn-gold:hover{background:var(--gold-light)}
.btn-gold:disabled{background:#3a3020;color:#6a5a3a;cursor:not-allowed}
.btn-outline{background:transparent;border:0.5px solid var(--border-gold);color:var(--gold)}
.btn-outline:hover{background:var(--gold-bg)}
.btn-danger{background:#5a1a1a;color:#f08080;border:0.5px solid #8a2a2a}
.btn-danger:hover{background:#7a1a1a}
.page{display:none;min-height:100vh}
.page.active{display:block}
.card{background:var(--surface);border:0.5px solid var(--border-gold);border-radius:var(--radius-lg);padding:1.5rem}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.badge-gold{background:var(--gold-dark);color:#f0e0a0}
.badge-sold{background:#3a0a0a;color:#f08080}
.badge-discount{background:#0a3a1a;color:#80f0a0}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.modal{background:var(--surface);border:0.5px solid var(--border-gold);border-radius:var(--radius-lg);padding:2rem;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.err{color:#f08080;font-size:12px;margin-top:4px}
select option{background:var(--surface2)}
.qty-badge{background:var(--gold-bg);border:0.5px solid var(--border-gold);color:var(--gold);font-size:11px;padding:2px 8px;border-radius:4px}
nav{background:var(--surface);border-bottom:0.5px solid var(--border-gold);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:500;color:var(--gold);letter-spacing:2px}
.logo span{color:var(--text2);font-size:13px;font-weight:400;letter-spacing:1px;display:block}
.cart-btn{position:relative;padding:8px 14px}
.cart-count{position:absolute;top:2px;right:2px;background:var(--gold);color:var(--black);border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
.product-card{background:var(--surface);border:0.5px solid var(--border-gold);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column}
.product-img{height:180px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative}
.product-body{padding:1rem;flex:1;display:flex;flex-direction:column;gap:8px}
.product-name{font-weight:500;color:var(--text);font-size:15px}
.product-price{color:var(--gold);font-size:16px;font-weight:500}
.product-price s{color:var(--text3);font-size:13px;margin-right:6px;font-weight:400}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.filter-btn{padding:6px 16px;font-size:13px;border-radius:20px;border:0.5px solid var(--border-gold);background:transparent;color:var(--text2);cursor:pointer;transition:.2s}
.filter-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold)}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.form-group label{font-size:13px;color:var(--text2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.divider{border:none;border-top:0.5px solid var(--border-gold);margin:1.5rem 0}
.tab-bar{display:flex;border-bottom:0.5px solid var(--border-gold);margin-bottom:1.5rem}
.tab{padding:10px 20px;font-size:14px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;background:transparent;border-left:none;border-right:none;border-top:none}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--gold);font-weight:500;border-bottom:0.5px solid var(--border-gold)}
td{padding:10px 12px;border-bottom:0.5px solid var(--border)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:var(--surface2);border-radius:var(--radius);padding:1rem}
.stat .label{font-size:12px;color:var(--text3);margin-bottom:4px}
.stat .value{font-size:22px;font-weight:500;color:var(--gold)}
</style>
</head>
<body>

<div id="page-auth" class="page active">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--black)">
    <div class="card" style="max-width:400px;width:100%;text-align:center">
      <div class="logo" style="margin-bottom:0.5rem;font-size:24px">TIE COLLEGE</div>
      <div style="color:var(--text2);font-size:13px;letter-spacing:2px;margin-bottom:2rem">PREMIUM NECKWEAR</div>
      <div class="tab-bar" style="justify-content:center">
        <button class="tab active" onclick="switchAuthTab('login')">Sign in</button>
        <button class="tab" onclick="switchAuthTab('register')">Register</button>
      </div>
      <div id="auth-login">
        <div class="form-group"><label>First name</label><input id="li-name" placeholder="Enter your first name"/></div>
        <div class="form-group"><label>Password</label><input id="li-pass" type="password" placeholder="Password"/></div>
        <div id="li-err" class="err"></div>
        <button class="btn-gold" style="width:100%;margin-top:1rem" onclick="doLogin()">Sign in</button>
        <button class="btn-outline" style="width:100%;margin-top:8px" onclick="doAdminLogin()">Admin access</button>
      </div>
      <div id="auth-register" style="display:none">
        <div class="form-group"><label>First name</label><input id="rg-name" placeholder="Your first name"/></div>
        <div class="form-group"><label>Password</label><input id="rg-pass" type="password" placeholder="Min 8 chars, upper, lower, number"/></div>
        <div class="form-group"><label>Confirm password</label><input id="rg-pass2" type="password" placeholder="Repeat password"/></div>
        <div id="rg-err" class="err"></div>
        <button class="btn-gold" style="width:100%;margin-top:1rem" onclick="doRegister()">Create account</button>
      </div>
    </div>
  </div>
</div>

<div id="page-admin" class="page">
  <nav>
    <div><div class="logo">TIE COLLEGE <span>ADMIN PANEL</span></div></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:13px;color:var(--text2)" id="admin-greeting"></span>
      <button class="btn-outline" style="padding:6px 14px;font-size:13px" onclick="logout()">Sign out</button>
    </div>
  </nav>
  <div style="padding:1.5rem;max-width:1100px;margin:0 auto">
    <div class="stat-grid" id="admin-stats"></div>
    <div class="tab-bar">
      <button class="tab active" onclick="adminTab('products')">Products</button>
      <button class="tab" onclick="adminTab('add')">Add product</button>
      <button class="tab" onclick="adminTab('settings')">Settings</button>
    </div>
    <div id="atab-products">
      <div class="table-wrap">
        <table id="admin-product-table">
          <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price (GH₵)</th><th>Discount</th><th>Qty</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="admin-product-body"></tbody>
        </table>
      </div>
    </div>
    <div id="atab-add" style="display:none">
      <div class="card" style="max-width:600px">
        <h3 style="margin-bottom:1.5rem">Add new product</h3>
        <div class="form-group"><label>Product name</label><input id="ap-name" placeholder="e.g. Classic Silk Necktie"/></div>
        <div class="two-col">
          <div class="form-group"><label>Category</label>
            <select id="ap-cat">
              <option value="Necktie">Necktie</option>
              <option value="Bow Tie">Bow Tie</option>
              <option value="Suspender">Suspender</option>
              <option value="Pocket Square">Pocket Square</option>
            </select>
          </div>
          <div class="form-group"><label>Price (GH₵)</label><input id="ap-price" type="number" placeholder="0.00"/></div>
        </div>
        <div class="two-col">
          <div class="form-group"><label>Quantity available</label><input id="ap-qty" type="number" placeholder="0"/></div>
          <div class="form-group"><label>Discount (%)</label><input id="ap-disc" type="number" placeholder="0" min="0" max="100"/></div>
        </div>
        <div class="form-group"><label>Product image URL (optional)</label><input id="ap-img" placeholder="https://..."/></div>
        <div id="ap-err" class="err"></div>
        <button class="btn-gold" style="margin-top:.5rem" onclick="addProduct()">Add product</button>
      </div>
    </div>
    <div id="atab-settings" style="display:none">
      <div class="card" style="max-width:500px">
        <h3 style="margin-bottom:1.5rem">Shop settings</h3>
        <div class="form-group">
          <label>Shop logo</label>
          <div style="display:flex;align-items:center;gap:1rem;margin-bottom:8px">
            <div id="logo-preview" style="width:72px;height:72px;border-radius:var(--radius);border:0.5px solid var(--border-gold);background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:11px;color:var(--text3);text-align:center">No logo</div>
            <div>
              <input type="file" id="set-logo" accept="image/*" style="display:none" onchange="previewLogo(this)"/>
              <button class="btn-outline" style="padding:7px 14px;font-size:13px" onclick="document.getElementById('set-logo').click()">Upload logo</button>
              <div style="font-size:11px;color:var(--text3);margin-top:5px">PNG, JPG or SVG recommended</div>
            </div>
          </div>
        </div>
        <div class="form-group"><label>Admin WhatsApp number (with country code)</label><input id="set-admin-wa" placeholder="+233XXXXXXXXX"/></div>
        <div class="form-group"><label>Admin name</label><input id="set-admin-name" placeholder="Admin first name"/></div>
        <div class="form-group"><label>Admin password</label><input id="set-admin-pass" type="password" placeholder="Current admin password"/></div>
        <div id="set-err" class="err"></div>
        <button class="btn-gold" onclick="saveSettings()">Save settings</button>
      </div>
    </div>
  </div>
</div>

<div id="page-shop" class="page">
  <nav>
    <div><div class="logo">TIE & CO. <span>PREMIUM NECKWEAR</span></div></div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:13px;color:var(--text2)" id="shop-greeting"></span>
      <button class="btn-outline cart-btn" onclick="showCart()">
        🛒 Cart <span class="cart-count" id="cart-count">0</span>
      </button>
      <button class="btn-outline" style="padding:6px 12px;font-size:13px" onclick="logout()">Sign out</button>
    </div>
  </nav>
  <div style="padding:1.5rem;max-width:1200px;margin:0 auto">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="grid" id="shop-grid"></div>
  </div>
</div>

<div id="modal-cart" style="display:none" class="modal-overlay">
  <div class="modal" style="max-width:560px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <h2>Your cart</h2>
      <button class="btn-outline" style="padding:5px 12px;font-size:13px" onclick="closeModal('modal-cart')">Close</button>
    </div>
    <div id="cart-items"></div>
    <hr class="divider"/>
    <h3 style="margin-bottom:1.25rem;font-size:15px;color:var(--text2)">Delivery & contact details</h3>
    <div class="two-col">
      <div class="form-group"><label>WhatsApp number</label><input id="c-wa" placeholder="+233XXXXXXXXX" oninput="validateOrder()"/></div>
      <div class="form-group"><label>Call number</label><input id="c-call" placeholder="+233XXXXXXXXX" oninput="validateOrder()"/></div>
    </div>
    <div class="form-group"><label>Delivery location</label><input id="c-loc" placeholder="Area / neighbourhood" oninput="validateOrder()"/></div>
    <div class="form-group">
      <label><input type="checkbox" id="c-outside" style="width:auto;margin-right:6px" onchange="validateOrder()"/> Delivery is outside Accra</label>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem">
      <div>
        <div style="font-size:13px;color:var(--text2)">Total</div>
        <div style="font-size:20px;font-weight:500;color:var(--gold)" id="cart-total">GH₵ 0.00</div>
      </div>
      <button class="btn-gold" id="place-order-btn" disabled onclick="placeOrder()">Place order</button>
    </div>
    <div id="order-err" class="err" style="margin-top:8px"></div>
  </div>
</div>

<div id="modal-confirm" style="display:none" class="modal-overlay">
  <div class="modal" style="text-align:center">
    <div style="font-size:40px;margin-bottom:1rem">✅</div>
    <h2 style="margin-bottom:.5rem">Order placed!</h2>
    <p style="color:var(--text2);font-size:14px;margin-bottom:1.5rem" id="confirm-msg"></p>
    <div style="background:var(--surface2);border-radius:var(--radius);padding:1rem;text-align:left;font-size:13px;margin-bottom:1.5rem" id="confirm-details"></div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn-gold" onclick="openWhatsApp()">Send via WhatsApp 📲</button>
      <button class="btn-outline" onclick="continueShopping()">Continue shopping</button>
    </div>
  </div>
</div>

<div id="modal-admin-login" style="display:none" class="modal-overlay">
  <div class="modal" style="max-width:360px">
    <h2 style="margin-bottom:1.5rem">Admin sign in</h2>
    <div class="form-group"><label>Admin name</label><input id="al-name" placeholder="Admin first name"/></div>
    <div class="form-group"><label>Password</label><input id="al-pass" type="password" placeholder="Admin password"/></div>
    <div id="al-err" class="err"></div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn-gold" onclick="confirmAdminLogin()">Sign in</button>
      <button class="btn-outline" onclick="closeModal('modal-admin-login')">Cancel</button>
    </div>
  </div>
</div>

<div id="modal-edit" style="display:none" class="modal-overlay">
  <div class="modal" style="max-width:500px">
    <h2 style="margin-bottom:1.5rem">Edit product</h2>
    <div class="form-group"><label>Product name</label><input id="ep-name"/></div>
    <div class="two-col">
      <div class="form-group"><label>Category</label>
        <select id="ep-cat">
          <option value="Necktie">Necktie</option>
          <option value="Bow Tie">Bow Tie</option>
          <option value="Suspender">Suspender</option>
          <option value="Pocket Square">Pocket Square</option>
        </select>
      </div>
      <div class="form-group"><label>Price (GH₵)</label><input id="ep-price" type="number"/></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>Quantity</label><input id="ep-qty" type="number"/></div>
      <div class="form-group"><label>Discount (%)</label><input id="ep-disc" type="number" min="0" max="100"/></div>
    </div>
    <div class="form-group"><label>Image URL</label><input id="ep-img"/></div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn-gold" onclick="saveEdit()">Save changes</button>
      <button class="btn-outline" onclick="closeModal('modal-edit')">Cancel</button>
    </div>
  </div>
</div>

<script>
const EMOJIS={Necktie:'👔',['Bow Tie']:'🎀',Suspender:'🩱',['Pocket Square']:'🟨',Cufflinks:'✨'};
let state={users:{},products:[],cart:[],currentUser:null,isAdmin:false,editId:null,settings:{adminWa:'',adminName:'Admin',adminPass:'admin123'},waMsg:''};

function save(){try{localStorage.setItem('tieShop',JSON.stringify(state))}catch(e){}}

function previewLogo(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const src=e.target.result;
    state.settings.logoSrc=src;
    document.getElementById('logo-preview').innerHTML=`<img src="${src}" style="width:100%;height:100%;object-fit:contain"/>`;
    updateLogos();save();
  };
  reader.readAsDataURL(file);
}

function updateLogos(){
  const src=state.settings.logoSrc;
  const logoHtml=src
    ?`<img src="${src}" style="height:38px;width:auto;object-fit:contain;vertical-align:middle;margin-right:8px"/>`
    :'';
  document.querySelectorAll('.logo').forEach(el=>{
    const span=el.querySelector('span');
    el.innerHTML=logoHtml+(span?`<span>${span.textContent}</span>`:'');
    if(!span)el.insertAdjacentHTML('beforeend',`<span style="display:block"></span>`);
  });
}
function load(){try{const d=localStorage.getItem('tieShop');if(d){const s=JSON.parse(d);state={...state,...s}}}catch(e){}}
load();
if(!state.settings)state.settings={adminWa:'',adminName:'Admin',adminPass:'admin123'};

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+id).classList.add('active')}
function closeModal(id){document.getElementById(id).style.display='none'}
function switchAuthTab(t){
  document.getElementById('auth-login').style.display=t==='login'?'block':'none';
  document.getElementById('auth-register').style.display=t==='register'?'block':'none';
  document.querySelectorAll('#page-auth .tab').forEach((b,i)=>{b.classList.toggle('active',(t==='login'&&i===0)||(t==='register'&&i===1))});
}
function validPass(p){return p.length>=8&&/[A-Z]/.test(p)&&/[a-z]/.test(p)&&/[0-9]/.test(p)}
function genId(){return 'P'+Math.floor(1000+Math.random()*9000)}

function doRegister(){
  const n=document.getElementById('rg-name').value.trim(),p=document.getElementById('rg-pass').value,p2=document.getElementById('rg-pass2').value,err=document.getElementById('rg-err');
  if(!n){err.textContent='First name required';return}
  if(!validPass(p)){err.textContent='Password must be 8+ chars with uppercase, lowercase, and a number';return}
  if(p!==p2){err.textContent='Passwords do not match';return}
  if(state.users[n.toLowerCase()]){err.textContent='Name already registered';return}
  state.users[n.toLowerCase()]={name:n,pass:p};save();
  err.style.color='#80f0a0';err.textContent='Account created! Sign in now.';
  setTimeout(()=>switchAuthTab('login'),1000);
}

function doLogin(){
  const n=document.getElementById('li-name').value.trim(),p=document.getElementById('li-pass').value,err=document.getElementById('li-err');
  const u=state.users[n.toLowerCase()];
  if(!u||u.pass!==p){err.textContent='Invalid name or password';return}
  state.currentUser=u.name;state.isAdmin=false;state.cart=[];save();
  document.getElementById('shop-greeting').textContent='Hi, '+u.name;
  renderShop();showPage('shop');
}

function doAdminLogin(){document.getElementById('modal-admin-login').style.display='flex';document.getElementById('al-err').textContent=''}
function confirmAdminLogin(){
  const n=document.getElementById('al-name').value.trim(),p=document.getElementById('al-pass').value,err=document.getElementById('al-err');
  if(n.toLowerCase()===state.settings.adminName.toLowerCase()&&p===state.settings.adminPass){
    state.isAdmin=true;state.currentUser=state.settings.adminName;closeModal('modal-admin-login');
    document.getElementById('admin-greeting').textContent='Welcome, '+state.settings.adminName;
    renderAdmin();showPage('admin');
  }else{err.textContent='Invalid admin credentials'}
}

function logout(){state.currentUser=null;state.isAdmin=false;state.cart=[];showPage('auth');updateCartCount()}

function calcPrice(p){return p.discount>0?p.price*(1-p.discount/100):p.price}

function renderShop(){
  const cats=['All','Necktie','Bow Tie','Suspender','Pocket Square','Cufflinks'];
  const fb=document.getElementById('filter-bar');
  fb.innerHTML=cats.map(c=>`<button class="filter-btn${c==='All'?' active':''}" onclick="filterShop('${c}',this)">${c}</button>`).join('');
  filterShop('All',fb.querySelector('.filter-btn'));
}

function filterShop(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const prods=cat==='All'?state.products:state.products.filter(p=>p.category===cat);
  const g=document.getElementById('shop-grid');
  if(!prods.length){g.innerHTML='<p style="color:var(--text3);grid-column:1/-1">No products available yet.</p>';return}
  g.innerHTML=prods.map(p=>{
    const fp=calcPrice(p).toFixed(2);
    const sold=p.qty<=0||p.soldOut;
    return`<div class="product-card">
      <div class="product-img">${p.img?`<img src="${p.img}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:''}
        <span style="position:absolute;font-size:48px">${EMOJIS[p.category]||'🎁'}</span>
        ${p.discount>0&&!sold?`<span class="badge badge-discount" style="position:absolute;top:8px;right:8px">-${p.discount}%</span>`:''}
        ${sold?`<span class="badge badge-sold" style="position:absolute;top:8px;left:8px">Sold out</span>`:''}
      </div>
      <div class="product-body">
        <span class="badge badge-gold">${p.category}</span>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${p.discount>0?`<s>GH₵ ${p.price.toFixed(2)}</s>`:''} GH₵ ${fp}</div>
        ${!sold?`<span class="qty-badge">${p.qty} in stock</span>`:''}
        <button class="btn-gold" style="margin-top:auto" ${sold?'disabled':''} onclick="addToCart('${p.id}')">${sold?'Sold out':'Add to cart'}</button>
      </div>
    </div>`}).join('');
}

function addToCart(id){
  const p=state.products.find(x=>x.id===id);if(!p)return;
  const ex=state.cart.find(x=>x.id===id);
  if(ex){ex.qty=Math.min(ex.qty+1,p.qty)}else{state.cart.push({id,qty:1})}
  updateCartCount();
}
function updateCartCount(){document.getElementById('cart-count').textContent=state.cart.reduce((a,x)=>a+x.qty,0)}

function showCart(){
  renderCartItems();validateOrder();
  document.getElementById('modal-cart').style.display='flex';
}

function renderCartItems(){
  const el=document.getElementById('cart-items');
  if(!state.cart.length){el.innerHTML='<p style="color:var(--text3);text-align:center;padding:1rem">Your cart is empty.</p>';document.getElementById('cart-total').textContent='GH₵ 0.00';return}
  let total=0;
  el.innerHTML=state.cart.map(ci=>{
    const p=state.products.find(x=>x.id===ci.id);if(!p)return'';
    const fp=calcPrice(p);total+=fp*ci.qty;
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border)">
      <div><div style="font-weight:500">${p.name}</div><div style="font-size:12px;color:var(--text2)">${p.category} · GH₵ ${fp.toFixed(2)} ea</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn-outline" style="padding:2px 8px" onclick="changeQty('${ci.id}',-1)">−</button>
        <span>${ci.qty}</span>
        <button class="btn-outline" style="padding:2px 8px" onclick="changeQty('${ci.id}',1)">+</button>
        <button class="btn-danger" style="padding:2px 8px;font-size:12px" onclick="removeFromCart('${ci.id}')">✕</button>
      </div>
    </div>`}).join('');
  document.getElementById('cart-total').textContent='GH₵ '+total.toFixed(2);
}

function changeQty(id,d){
  const p=state.products.find(x=>x.id===id);
  const ci=state.cart.find(x=>x.id===id);if(!ci)return;
  ci.qty+=d;if(ci.qty<=0)state.cart=state.cart.filter(x=>x.id!==id);
  if(p&&ci.qty>p.qty)ci.qty=p.qty;
  renderCartItems();updateCartCount();validateOrder();
}
function removeFromCart(id){state.cart=state.cart.filter(x=>x.id!==id);renderCartItems();updateCartCount();validateOrder()}

function validateOrder(){
  const wa=document.getElementById('c-wa').value.trim();
  const call=document.getElementById('c-call').value.trim();
  const loc=document.getElementById('c-loc').value.trim();
  const hasItems=state.cart.length>0;
  const ok=hasItems&&wa.length>=7&&call.length>=7&&loc.length>=2;
  document.getElementById('place-order-btn').disabled=!ok;
  document.getElementById('order-err').textContent='';
}

function placeOrder(){
  const wa=document.getElementById('c-wa').value.trim();
  const call=document.getElementById('c-call').value.trim();
  const loc=document.getElementById('c-loc').value.trim();
  const outside=document.getElementById('c-outside').checked;
  const items=state.cart.map(ci=>{
    const p=state.products.find(x=>x.id===ci.id);
    return{...ci,name:p?p.name:'Unknown',pid:p?p.id:'?',fp:p?calcPrice(p):0}
  });
  const total=items.reduce((a,x)=>a+x.fp*x.qty,0);
  const locStr=loc+(outside?' (Outside Accra)':'');
  const msg=`*🛍️ NEW ORDER — TIE & CO.*\n\n*Client:* ${state.currentUser}\n*WhatsApp:* ${wa}\n*Call:* ${call}\n*Delivery:* ${locStr}\n\n*Items ordered:*\n${items.map(x=>`• ${x.name} (ID: ${x.pid}) x${x.qty} — GH₵ ${(x.fp*x.qty).toFixed(2)}`).join('\n')}\n\n*Total: GH₵ ${total.toFixed(2)}*`;
  state.waMsg=msg;
  items.forEach(ci=>{const p=state.products.find(x=>x.id===ci.id);if(p)p.qty=Math.max(0,p.qty-ci.qty);if(p&&p.qty===0)p.soldOut=true;});
  save();
  document.getElementById('confirm-msg').textContent=`Thank you, ${state.currentUser}! Your order has been received. Tap below to notify the shop via WhatsApp.`;
  document.getElementById('confirm-details').innerHTML=`<strong style="color:var(--gold)">Order summary</strong><br/><br/>`+items.map(x=>`${x.name} × ${x.qty}<br/>`).join('')+`<br/><strong>Total: GH₵ ${total.toFixed(2)}</strong><br/><br/>Delivery to: ${locStr}<br/>Your WhatsApp: ${wa}`;
  closeModal('modal-cart');
  document.getElementById('modal-confirm').style.display='flex';
  state.cart=[];updateCartCount();
}

function openWhatsApp(){
  const num=state.settings.adminWa.replace(/\D/g,'');
  const url=`https://wa.me/${num}?text=${encodeURIComponent(state.waMsg)}`;
  window.open(url,'_blank');
}

function continueShopping(){closeModal('modal-confirm');renderShop()}

function adminTab(t){
  ['products','add','settings'].forEach(x=>{document.getElementById('atab-'+x).style.display=x===t?'block':'none'});
  document.querySelectorAll('#page-admin .tab').forEach((b,i)=>{b.classList.toggle('active',(['products','add','settings'])[i]===t)});
}

function renderAdmin(){
  const s=state.settings;
  document.getElementById('set-admin-wa').value=s.adminWa||'';
  document.getElementById('set-admin-name').value=s.adminName||'';
  document.getElementById('set-admin-pass').value=s.adminPass||'';
  if(s.logoSrc){document.getElementById('logo-preview').innerHTML=`<img src="${s.logoSrc}" style="width:100%;height:100%;object-fit:contain"/>`;updateLogos();}
  const stats=document.getElementById('admin-stats');
  const total=state.products.length,active=state.products.filter(p=>!p.soldOut&&p.qty>0).length,sold=state.products.filter(p=>p.soldOut||p.qty<=0).length;
  stats.innerHTML=`<div class="stat"><div class="label">Total products</div><div class="value">${total}</div></div><div class="stat"><div class="label">Active</div><div class="value">${active}</div></div><div class="stat"><div class="label">Sold out</div><div class="value">${sold}</div></div>`;
  const tbody=document.getElementById('admin-product-body');
  if(!state.products.length){tbody.innerHTML='<tr><td colspan="8" style="color:var(--text3);text-align:center;padding:2rem">No products added yet.</td></tr>';return}
  tbody.innerHTML=state.products.map(p=>`<tr>
    <td style="font-family:monospace;color:var(--gold)">${p.id}</td>
    <td>${p.name}</td>
    <td><span class="badge badge-gold">${p.category}</span></td>
    <td>GH₵ ${p.price.toFixed(2)}</td>
    <td>${p.discount?p.discount+'%':'—'}</td>
    <td>${p.qty}</td>
    <td><button class="badge ${p.soldOut||p.qty<=0?'badge-sold':'badge-discount'}" onclick="toggleSold('${p.id}')" style="cursor:pointer;border:none">${p.soldOut||p.qty<=0?'Sold out':'Active'}</button></td>
    <td style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn-outline" style="padding:4px 10px;font-size:12px" onclick="openEdit('${p.id}')">Edit</button>
      <button class="btn-danger" style="padding:4px 10px;font-size:12px" onclick="deleteProduct('${p.id}')">Delete</button>
    </td>
  </tr>`).join('');
}

function addProduct(){
  const n=document.getElementById('ap-name').value.trim(),cat=document.getElementById('ap-cat').value,price=parseFloat(document.getElementById('ap-price').value),qty=parseInt(document.getElementById('ap-qty').value)||0,disc=parseInt(document.getElementById('ap-disc').value)||0,img=document.getElementById('ap-img').value.trim(),err=document.getElementById('ap-err');
  if(!n){err.textContent='Product name required';return}
  if(isNaN(price)||price<=0){err.textContent='Valid price required';return}
  let id=genId();while(state.products.find(p=>p.id===id))id=genId();
  state.products.push({id,name:n,category:cat,price,qty,discount:disc,img,soldOut:qty<=0});
  save();err.style.color='#80f0a0';err.textContent='Product added!';
  ['ap-name','ap-price','ap-qty','ap-disc','ap-img'].forEach(x=>document.getElementById(x).value='');
  setTimeout(()=>{err.textContent='';adminTab('products');renderAdmin()},800);
}

function toggleSold(id){
  const p=state.products.find(x=>x.id===id);if(!p)return;
  p.soldOut=!p.soldOut;if(!p.soldOut&&p.qty===0)p.qty=1;save();renderAdmin();
}

function deleteProduct(id){
  if(!confirm('Delete this product?'))return;
  state.products=state.products.filter(x=>x.id!==id);save();renderAdmin();
}

function openEdit(id){
  const p=state.products.find(x=>x.id===id);if(!p)return;
  state.editId=id;
  document.getElementById('ep-name').value=p.name;
  document.getElementById('ep-cat').value=p.category;
  document.getElementById('ep-price').value=p.price;
  document.getElementById('ep-qty').value=p.qty;
  document.getElementById('ep-disc').value=p.discount||0;
  document.getElementById('ep-img').value=p.img||'';
  document.getElementById('modal-edit').style.display='flex';
}

function saveEdit(){
  const p=state.products.find(x=>x.id===state.editId);if(!p)return;
  p.name=document.getElementById('ep-name').value.trim();
  p.category=document.getElementById('ep-cat').value;
  p.price=parseFloat(document.getElementById('ep-price').value)||p.price;
  p.qty=parseInt(document.getElementById('ep-qty').value)||0;
  p.discount=parseInt(document.getElementById('ep-disc').value)||0;
  p.img=document.getElementById('ep-img').value.trim();
  p.soldOut=p.qty<=0;
  save();closeModal('modal-edit');renderAdmin();
}

function saveSettings(){
  const wa=document.getElementById('set-admin-wa').value.trim(),n=document.getElementById('set-admin-name').value.trim(),pass=document.getElementById('set-admin-pass').value,err=document.getElementById('set-err');
  if(!wa||!n||!pass){err.textContent='All fields required';return}
  state.settings={...state.settings,adminWa:wa,adminName:n,adminPass:pass};save();
  err.style.color='#80f0a0';err.textContent='Settings saved!';setTimeout(()=>err.textContent='',2000);
}
</script>
</body>
</html>
